{% extends 'base.html' %}

{% block title %}Статті{% endblock %}

{% block content %}
<h2>Статті</h2>

<a href="{% url 'create' %}">➕ Створити статтю</a>
<hr>

{% for article in articles %}
    <h3>{{ article.title }}</h3>
    <p>{{ article.content }}</p>
    <small>Автор: {{ article.author }}</small>
    <hr>
{% empty %}
    <p>Поки що статей немає.</p>
{% endfor %}

{% endblock %}
