{% extends 'base.html' %}

{% block title %}Профіль{% endblock %}

{% block content %}
<h2>Профіль користувача</h2>

<p><strong>Логін:</strong> {{ request.user.username }}</p>

{% if request.user.email %}
    <p><strong>Email:</strong> {{ request.user.email }}</p>
{% endif %}

<p>Ви успішно увійшли в систему.</p>
<a href="{% url 'logout' %}">Вийти</a>
{% endblock %}
