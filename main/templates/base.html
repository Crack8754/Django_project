{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мій сайт{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <h1>Мій сайт</h1>

    <nav>
        <a href="{% url 'home' %}">Головна</a>
        <a href="{% url 'about' %}">Про сайт</a>
        <a href="{% url 'products' %}">Товари</a>

        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">Профіль</a>
            <a href="{% url 'logout' %}">Вийти</a>
        {% else %}
            <a href="{% url 'login' %}">Увійти</a>
            <a href="{% url 'register' %}">Реєстрація</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>Практична робота Django</p>
</footer>

</body>
</html>
