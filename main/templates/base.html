{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LEGO Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="topbar">
    <div class="nav-links">
        <a href="{% url 'home' %}">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/LEGO_logo.svg/250px-LEGO_logo.svg.png" class="logo">

</a>

        <a href="{% url 'about' %}">ПРО НАС</a>
        <a href="{% url 'products' %}">ТОВАРИ</a>
    </div>

    <div class="search-box">
        <form method="get" action="{% url 'products' %}" class="d-flex">

    <input type="text" 
           name="search"
           class="form-control me-2"
           placeholder="Пошук..."
           value="{{ request.GET.search }}">

    <button type="submit" class="btn btn-outline-dark">
        🔍
    </button>

</form>

    </div>

    <div class="user-block">
{% if user.is_authenticated %}
<div class="dropdown">

    <button class="btn profile-btn dropdown-toggle" data-bs-toggle="dropdown">
        👤 {{ user.username }}
    </button>

    <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="{% url 'profile' %}">Профіль</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Вийти</a></li>
    </ul>

</div>
{% else %}
<div class="dropdown">

    <button class="btn profile-btn dropdown-toggle" 
            data-bs-toggle="dropdown"
            data-bs-display="static">
        👤 Гість
    </button>

    <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="{% url 'login' %}">Увійти</a></li>
        <li><a class="dropdown-item" href="{% url 'register' %}">Реєстрація</a></li>
    </ul>

</div>


{% endif %}
    </div>
    

</header>

<main>
    {% block content %}
    {% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
