{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LEGO Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .search-wrapper {
            position: relative;
        }
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            z-index: 9999;
            max-height: 320px;
            overflow-y: auto;
            display: none;
        }
        .autocomplete-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: black;
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-item:hover, .autocomplete-item.active {
            background: #f5f5f5;
            color: black;
        }
        .autocomplete-item .item-name {
            font-size: 14px;
            font-weight: 500;
        }
        .autocomplete-item .item-meta {
            font-size: 12px;
            color: #888;
        }
        .autocomplete-item .item-price {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    

<header class="topbar">
    <div class="nav-links">
        <a href="{% url 'home' %}">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/LEGO_logo.svg/250px-LEGO_logo.svg.png" class="logo">

</a>

        <a href="{% url 'about' %}">ПРО НАС</a>
        <a href="{% url 'products' %}">ТОВАРИ</a>
    </div>

    <div class="search-box">
        <form method="get" action="{% url 'products' %}" class="d-flex" id="search-form">

    <div class="search-wrapper flex-grow-1 me-2">
        <input type="text" 
               name="search"
               id="search-input"
               class="form-control"
               placeholder="Пошук..."
               value="{{ request.GET.search }}"
               autocomplete="off">
        <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
    </div>

    <button type="submit" class="btn btn-outline-dark">
        🔍
    </button>

</form>

    </div>

    <div class="user-block">
{% if user.is_authenticated %}
<div class="dropdown">

    <button class="btn profile-btn dropdown-toggle" data-bs-toggle="dropdown">
        👤 {{ user.username }}
    </button>

    <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="{% url 'profile' %}">Профіль</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">Вийти</a></li>
    </ul>

</div>
{% else %}
<div class="dropdown">

    <button class="btn profile-btn dropdown-toggle" 
            data-bs-toggle="dropdown"
            data-bs-display="static">
        👤 Гість
    </button>

    <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="{% url 'login' %}">Увійти</a></li>
        <li><a class="dropdown-item" href="{% url 'register' %}">Реєстрація</a></li>
    </ul>

</div>


{% endif %}
    </div>
    

</header>

<main>
    {% block content %}
    {% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function() {
    const input = document.getElementById('search-input');
    const dropdown = document.getElementById('autocomplete-dropdown');
    if (!input || !dropdown) return;

    let activeIndex = -1;
    let debounceTimer;

    input.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const query = this.value.trim();
        if (query.length === 0) {
            closeDropdown();
            return;
        }
        debounceTimer = setTimeout(() => fetchSuggestions(query), 200);
    });

    input.addEventListener('keydown', function(e) {
        const items = dropdown.querySelectorAll('.autocomplete-item');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, items.length - 1);
            updateActive(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, -1);
            updateActive(items);
        } else if (e.key === 'Enter' && activeIndex >= 0) {
            e.preventDefault();
            items[activeIndex].click();
        } else if (e.key === 'Escape') {
            closeDropdown();
        }
    });

    document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !dropdown.contains(e.target)) {
            closeDropdown();
        }
    });

    function fetchSuggestions(query) {
        fetch('/search-autocomplete/?q=' + encodeURIComponent(query))
            .then(r => r.json())
            .then(data => {
                renderDropdown(data.results, query);
            });
    }

    function renderDropdown(results, query) {
        activeIndex = -1;
        if (results.length === 0) {
            closeDropdown();
            return;
        }
        dropdown.innerHTML = results.map(item => {
            const highlighted = item.name.replace(
                new RegExp('(' + escapeRegex(query) + ')', 'gi'),
                '<strong>$1</strong>'
            );
            return `<a href="/products/?search=${encodeURIComponent(item.name)}" class="autocomplete-item">
                <div>
                    <div class="item-name">${highlighted}</div>
                    <div class="item-meta">${item.category}</div>
                </div>
                <div class="item-price">${item.price} грн</div>
            </a>`;
        }).join('');
        dropdown.style.display = 'block';
    }

    function updateActive(items) {
        items.forEach((el, i) => {
            el.classList.toggle('active', i === activeIndex);
        });
    }

    function closeDropdown() {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
        activeIndex = -1;
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
})();
</script>
</body>
</html>
